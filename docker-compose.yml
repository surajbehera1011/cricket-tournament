services:
  postgres:
    image: postgres:16-alpine
    container_name: cricket-db
    environment:
      POSTGRES_USER: cricket
      POSTGRES_PASSWORD: cricket_dev
      POSTGRES_DB: cricket_tournament
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cricket -d cricket_tournament"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
